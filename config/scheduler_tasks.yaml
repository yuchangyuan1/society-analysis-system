# Scheduler tasks - redesign-2026-05.

defaults:
  run_on_start: true
  enabled: true

tasks:
  # Pull official sources and embed chunks into Chroma 1.
  - name: official_sources
    kind: official_ingestion
    cron: "15 1 * * *"
    args:
      source_filter: null
      write_chroma: true

  # Reddit community ingestion.
  - name: reddit_default
    kind: precompute_v2
    cron: "30 2 * * *"
    args:
      subreddits:
        - conspiracy
        - worldnews
        - politics
      reddit_days_back: 1

  # Decay stale NL2SQL/planner exemplars while preserving anchors.
  - name: experience_decay
    kind: decay_experience
    cron: "0 4 * * *"
    args:
      ttl_days: 30
      min_confidence: 0.2
      dry_run: false
